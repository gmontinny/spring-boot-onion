apiVersion: apps/v1
kind: Deployment
metadata:
  name: onion-app
  namespace: onion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onion-app
  template:
    metadata:
      labels:
        app: onion-app
    spec:
      containers:
        - name: onion-app
          image: onion-app:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: onion-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: onion-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onion-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: onion-secrets
                  key: JWT_SECRET
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: onion-secrets
                  key: VAULT_TOKEN
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: onion-service
  namespace: onion
spec:
  selector:
    app: onion-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onion-ingress
  namespace: onion
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.onion.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: onion-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onion-hpa
  namespace: onion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onion-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
