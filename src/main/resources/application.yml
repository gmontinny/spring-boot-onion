spring:
  application:
    name: onion
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/onion_db}
    username: ${DB_USERNAME:gmontinny}
    password: ${DB_PASSWORD:Gmontinny2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:myroot}
      kv:
        enabled: true
        backend: secret
        default-context: onion

jwt:
  secret: ${JWT_SECRET:OnionArchitectureSecretKeyForJWTTokenMustBeAtLeast256BitsLong}
  expiration: 900000
  refresh-expiration: 604800000

rate-limit:
  requests-per-minute: 60

server:
  port: 8080

springdoc:
  default-flat-param-object: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
