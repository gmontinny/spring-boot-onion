databaseChangeLog:
  - changeSet:
      id: 010-create-app-users
      author: onion
      changes:
        - createTable:
            tableName: app_users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
        - createIndex:
            indexName: idx_app_users_username
            tableName: app_users
            columns:
              - column:
                  name: username
