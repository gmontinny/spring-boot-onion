databaseChangeLog:
  - changeSet:
      id: 007-create-order-items
      author: onion
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: order_item_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: seller_id
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: shipping_limit_date
                  type: timestamp
              - column:
                  name: price
                  type: decimal(10,2)
              - column:
                  name: freight_value
                  type: decimal(10,2)
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: order_id
            constraintName: fk_order_items_order
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: product_id
            constraintName: fk_order_items_product
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: seller_id
            referencedTableName: sellers
            referencedColumnNames: seller_id
            constraintName: fk_order_items_seller
