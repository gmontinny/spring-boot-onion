services:
  db:
    image: postgres:latest
    container_name: postgres-onion
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: onion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  vault:
    image: hashicorp/vault:latest
    container_name: vault-onion
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      SKIP_SETCAP: "true"
    cap_add:
      - IPC_LOCK

  app:
    build: .
    container_name: onion-app
    profiles:
      - full
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/onion_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
      - vault

volumes:
  postgres_data:
