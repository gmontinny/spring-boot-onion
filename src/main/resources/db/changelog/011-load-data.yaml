databaseChangeLog:
  - changeSet:
      id: 011-load-customers-data
      author: onion
      changes:
        - loadData:
            tableName: customers
            file: db/data/olist_customers_dataset.csv
            separator: ","
            quotchar: "\""
            columns:
              - column:
                  name: customer_id
                  header: customer_id
              - column:
                  name: customer_unique_id
                  header: customer_unique_id
              - column:
                  name: customer_zip_code_prefix
                  header: customer_zip_code_prefix
              - column:
                  name: customer_city
                  header: customer_city
              - column:
                  name: customer_state
                  header: customer_state

  - changeSet:
      id: 012-load-sellers-data
      author: onion
      changes:
        - loadData:
            tableName: sellers
